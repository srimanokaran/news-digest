{% extends "layout.html" %}
{% block container_class %}narrow{% endblock %}
{% block content %}
{% if diff_content %}
  <div class="diff-content">
    {{ diff_content }}
  </div>
{% else %}
  <div class="empty-state">
    <div class="empty-icon">~</div>
    <h3>No changes to show</h3>
    <p>There's no previous day to compare against for {{ date }}. Check back tomorrow.</p>
  </div>
{% endif %}
{% endblock %}
